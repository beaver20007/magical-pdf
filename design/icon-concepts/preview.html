<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Magic PDF Icon Concepts</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f6f8; color: #172026; }
    main { max-width: 1180px; margin: 0 auto; padding: 32px; }
    h1 { margin: 0 0 22px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
    figure { margin: 0; padding: 18px; background: white; border: 1px solid #dce4ea; border-radius: 10px; }
    img { display: block; width: 100%; aspect-ratio: 1; }
    figcaption { margin-top: 12px; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>Magic PDF Icon Concepts</h1>
    <section class="grid">
        <figure>
          <img src="./01-wand-document.svg" alt="Wand Document">
          <figcaption>Wand Document</figcaption>
        </figure>
      
        <figure>
          <img src="./02-spark-scan.svg" alt="Spark Scan">
          <figcaption>Spark Scan</figcaption>
        </figure>
      
        <figure>
          <img src="./03-red-pdf-magic.svg" alt="Red PDF Magic">
          <figcaption>Red PDF Magic</figcaption>
        </figure>
      
        <figure>
          <img src="./04-minimal-magic-pdf.svg" alt="Minimal Magic PDF">
          <figcaption>Minimal Magic PDF</figcaption>
        </figure>
      </section>
  </main>
</body>
</html>
